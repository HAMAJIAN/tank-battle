<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAMA坦克大战</title>
<style>
  body { margin:0; background:#000; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; font-family:'Microsoft YaHei',sans-serif; }
  canvas { border:2px solid #4a4; }
  #ui { position:fixed; top:10px; left:50%; transform:translateX(-50%); color:#0f0; font-size:16px; font-weight:bold; z-index:2; text-shadow:0 0 8px rgba(0,255,0,0.6); font-family:'Courier New',monospace; }
  #startBtn {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    z-index:10; padding:20px 50px; font-size:26px; font-weight:bold;
    font-family:'Microsoft YaHei',sans-serif; color:#0f0;
    background:rgba(0,0,0,0.9); border:3px solid #0f0; border-radius:10px;
    cursor:pointer; letter-spacing:4px;
  }
  #startBtn:hover { background:#0f0; color:#000; box-shadow:0 0 30px rgba(0,255,0,0.5); }
  #dbg { position:fixed; bottom:10px; left:10px; color:#ff0; font-size:12px; z-index:5; font-family:'Courier New',monospace; }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="ui">
  <span>SCORE: <span id="sc">0</span></span>&nbsp;&nbsp;
  <span>LEVEL: <span id="lv">1</span></span>&nbsp;&nbsp;
  <span>LIVES: <span id="hp">♥♥♥</span></span>
</div>
<button id="startBtn" onclick="handleEnter()">开始游戏</button>
<div id="dbg"></div>

<script>
// 调试
var dbg = document.getElementById('dbg');
function log(msg) { dbg.textContent = msg; console.log(msg); }
log('Script loaded');

// Canvas
var c = document.getElementById('c');
var ctx = c.getContext('2d');
var W = 780, H = 585;
c.width = W; c.height = H;
log('Canvas: ' + W + 'x' + H);

// 状态
var MENU=0, PLAY=1, WIN=2, OVER=3;
var state = MENU;
var score = 0, level = 1, lives = 3;
var TILE = 39, COLS = 20, ROWS = 15;
var WALL = 1;
var map = [];

// 键盘
var keys = {};
document.addEventListener('keydown', function(e) {
  keys[e.key] = true;
  if (e.key===' '||e.key.startsWith('Arrow')) e.preventDefault();
  if (e.key==='Enter'||e.code==='Enter'||e.keyCode===13) {
    e.preventDefault();
    handleEnter();
  }
});
document.addEventListener('keyup', function(e) { keys[e.key] = false; });

// 点击 canvas 开始
c.addEventListener('click', function() { if (state===MENU) handleEnter(); });

// 音效
var audioCtx = null;
function initAudio() {
  if (audioCtx) return;
  try { var AC = window.AudioContext || window.webkitAudioContext; if (AC) audioCtx = new AC(); } catch(e) {}
}
function sfx(f,d,t,v) {
  if (!audioCtx) return;
  try {
    var o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type=t; o.frequency.value=f;
    g.gain.setValueAtTime(v, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+d);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime+d);
  } catch(e) {}
}

// 构建地图
function buildMap() {
  map = [];
  for (var y=0; y<ROWS; y++) {
    map[y] = [];
    for (var x=0; x<COLS; x++) map[y][x] = 0;
  }
  // 边框
  for (var x=0; x<COLS; x++) { map[0][x]=WALL; map[ROWS-1][x]=WALL; }
  for (var y=0; y<ROWS; y++) { map[y][0]=WALL; map[y][COLS-1]=WALL; }
  // 内部墙
  var pats = [
    [4,4,4,5,4,6,4,7,4,8,5,4,6,4,7,4,8,4,9,4,11,4,12,4,13,4,14,4,15,4,5,8,6,8,7,8,8,8,9,8],
    [2,2,2,5,2,8,2,11,2,14,2,17,5,2,5,5,5,8,5,11,5,14,5,17,8,2,8,5,11,8,11,11,11,14,11,17,14,2,14,5,14,8,14,11,14,14,14,17,17,2,17,5,17,8,17,11,17,14,17,17],
    [3,3,3,4,3,5,4,3,5,3,6,3,3,10,3,11,4,11,5,11,6,11,11,3,12,3,13,3,14,3,11,4,11,5,11,10,11,11,12,11,13,11,14,11,12,10]
  ];
  var p = pats[Math.floor(Math.random()*pats.length)];
  for (var i=0; i<p.length; i+=2) {
    var py=p[i], px=p[i+1];
    if (py>0 && py<ROWS-1 && px>0 && px<COLS-1) map[py][px] = WALL;
  }
}

// Tank
function Tank(x, y, dir, color, isPlayer) {
  this.x=x; this.y=y; this.dir=dir; this.color=color; this.isPlayer=!!isPlayer;
  this.speed=isPlayer?2.5:1.1; this.alive=true;
  this.cooldown=0; this.cdMax=isPlayer?20:90+Math.random()*70;
  this.aiTimer=0; this.aiDir=dir; this.aiDur=40+Math.random()*80;
}
Tank.prototype.rect = function() {
  return {l:this.x+4, t:this.y+4, r:this.x+35, b:this.y+35};
};
Tank.prototype.hitTank = function(o) {
  if (!o||!o.alive) return false;
  var a=this.rect(), b=o.rect();
  return !(a.r<=b.l||a.l>=b.r||a.b<=b.t||a.t>=b.b);
};
Tank.prototype.hitWall = function() {
  var r=this.rect();
  var x1=Math.floor(r.l/TILE), x2=Math.floor((r.r-0.1)/TILE);
  var y1=Math.floor(r.t/TILE), y2=Math.floor((r.b-0.1)/TILE);
  for (var y=y1; y<=y2; y++)
    for (var x=x1; x<=x2; x++)
      if (y>=0&&y<ROWS&&x>=0&&x<COLS&&map[y][x]===WALL) return true;
  return false;
};
Tank.prototype.canMove = function(nx, ny, all) {
  var ox=this.x, oy=this.y;
  this.x=nx; this.y=ny;
  var r=this.rect(), ok=true;
  if (r.l<0||r.r>W||r.t<0||r.b>H) ok=false;
  else if (this.hitWall()) ok=false;
  else for (var i=0; i<all.length; i++) {
    if (all[i]===this||!all[i].alive) continue;
    if (this.hitTank(all[i])) { ok=false; break; }
  }
  this.x=ox; this.y=oy;
  return ok;
};
Tank.prototype.fire = function() {
  if (this.cooldown>0) return null;
  this.cooldown=this.cdMax;
  var bx=this.x+19, by=this.y+19;
  if (this.dir==='up') by=this.y-4;
  else if (this.dir==='down') by=this.y+43;
  else if (this.dir==='left') bx=this.x-4;
  else bx=this.x+43;
  return new Bullet(bx, by, this.dir, this.isPlayer);
};
Tank.prototype.draw = function() {
  if (!this.alive) return;
  ctx.save();
  ctx.translate(Math.floor(this.x+19.5), Math.floor(this.y+19.5));
  var a={up:0, right:Math.PI/2, down:Math.PI, left:-Math.PI/2};
  ctx.rotate(a[this.dir]);
  // 履带
  ctx.fillStyle='#1a1a1a';
  ctx.fillRect(-18,-15,4,30);
  ctx.fillRect(14,-15,4,30);
  for (var i=-13; i<15; i+=4) {
    ctx.fillStyle='#333';
    ctx.fillRect(-18,i,4,2);
    ctx.fillRect(14,i,4,2);
  }
  // 车身
  ctx.fillStyle=this.color;
  ctx.fillRect(-13,-13,26,26);
  // 炮塔
  ctx.fillStyle=this.isPlayer?'#0c0':'#f33';
  ctx.beginPath(); ctx.arc(0,0,9,0,Math.PI*2); ctx.fill();
  // 炮管
  ctx.fillStyle='#ccc';
  ctx.fillRect(-3,-20,6,12);
  // HAMA 标签
  ctx.fillStyle='#fff';
  ctx.font='bold 7px "Courier New",monospace';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('HAMA',0,2);
  ctx.restore();
};

// Bullet
function Bullet(x,y,dir,fp) {
  this.x=x; this.y=y; this.dir=dir; this.fromPlayer=fp;
  this.speed=fp?5:3; this.alive=true;
}
Bullet.prototype.update = function() {
  if (this.dir==='up') this.y-=this.speed;
  else if (this.dir==='down') this.y+=this.speed;
  else if (this.dir==='left') this.x-=this.speed;
  else this.x+=this.speed;
  if (this.x<0||this.x>W||this.y<0||this.y>H) { this.alive=false; return; }
  var tx=Math.floor(this.x/TILE), ty=Math.floor(this.y/TILE);
  if (ty>=0&&ty<ROWS&&tx>=0&&tx<COLS&&map[ty][tx]===WALL) {
    this.alive=false; map[ty][tx]=0;
  }
};
Bullet.prototype.draw = function() {
  if (!this.alive) return;
  ctx.fillStyle=this.fromPlayer?'#ff0':'#f55';
  ctx.shadowColor=this.fromPlayer?'#ff0':'#f55';
  ctx.shadowBlur=6;
  ctx.beginPath(); ctx.arc(this.x,this.y,3,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
};

// Particle
function Particle(x,y) {
  this.x=x; this.y=y;
  this.vx=(Math.random()-0.5)*7; this.vy=(Math.random()-0.5)*7;
  this.life=1; this.decay=0.02+Math.random()*0.06;
  this.r=2+Math.random()*4;
  this.color=['#f80','#ff0','#f44','#fff'][Math.floor(Math.random()*4)];
}
Particle.prototype.update = function() { this.x+=this.vx; this.y+=this.vy; this.life-=this.decay; };
Particle.prototype.draw = function() {
  if (this.life<=0) return;
  ctx.globalAlpha=this.life;
  ctx.fillStyle=this.color;
  ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
};

// 游戏数据
var player=null, enemies=[], bullets=[], parts=[];
var spawnTimer=0, respawnTimer=0;

function spawnEnemy() {
  var s=Math.floor(Math.random()*4), x, y;
  if (s===0) { x=40+Math.random()*(W-80); y=50; }
  else if (s===1) { x=40+Math.random()*(W-80); y=H-90; }
  else if (s===2) { x=50; y=50+Math.random()*(H-160); }
  else { x=W-90; y=50+Math.random()*(H-160); }
  var dirs=['up','down','left','right'];
  return new Tank(x, y, dirs[Math.floor(Math.random()*4)], '#e00', false);
}

function startGame() {
  initAudio();
  buildMap();
  player = new Tank(W/2-19.5, H/2-19.5, 'up', '#0a0', true);
  enemies=[]; bullets=[]; parts=[];
  score=0; level=1; lives=3;
  spawnTimer=0; respawnTimer=0;

  for (var i=0; i<3; i++) {
    var e=spawnEnemy(), tries=0;
    while (e.hitTank(player) && tries++<50) e=spawnEnemy();
    enemies.push(e);
  }
  state = PLAY;
  document.getElementById('startBtn').style.display = 'none';
  updateUI();
  log('Game started! Player at '+player.x+','+player.y+' Enemies:'+enemies.length);
}

function handleEnter() {
  if (state===MENU) startGame();
  else if (state===OVER) startGame();
  else if (state===WIN) { nextLevel(); state=PLAY; updateUI(); }
}

function updateUI() {
  document.getElementById('sc').textContent = score;
  document.getElementById('lv').textContent = level;
  var h=''; for (var i=0; i<lives; i++) h+='♥';
  document.getElementById('hp').textContent = h;
}

function nextLevel() {
  level++; buildMap();
  player.x=W/2-19.5; player.y=H/2-19.5;
  player.alive=true; player.dir='up'; player.cooldown=0;
  bullets=[]; parts=[]; enemies=[]; spawnTimer=0; respawnTimer=0;
  var cnt=2+level;
  for (var i=0; i<cnt; i++) {
    var e=spawnEnemy(), all=[player].concat(enemies), tries=0, ok=false;
    while (!ok && tries++<50) {
      ok=true;
      for (var j=0; j<all.length; j++) { if (all[j].alive&&e.hitTank(all[j])){ok=false;break;} }
      if (!ok) e=spawnEnemy();
    }
    enemies.push(e);
  }
  updateUI();
  log('Level '+level+' started. Enemies:'+enemies.length);
}

function explode(x,y) {
  for (var i=0; i<25; i++) parts.push(new Particle(x,y));
}

// 更新
function update() {
  if (state!==PLAY) return;

  var all = [player].concat(enemies);

  // 重生
  if (!player.alive) {
    respawnTimer++;
    if (respawnTimer>80) {
      respawnTimer=0;
      player.x=W/2-19.5; player.y=H/2-19.5;
      player.alive=true; player.dir='up'; player.cooldown=0;
      log('Player respawned');
    }
  }

  // 玩家
  if (player.alive) {
    var dx=0, dy=0;
    if (keys['ArrowUp']||keys['w']||keys['W']) { player.dir='up'; dy=-player.speed; }
    if (keys['ArrowDown']||keys['s']||keys['S']) { player.dir='down'; dy=player.speed; }
    if (keys['ArrowLeft']||keys['a']||keys['A']) { player.dir='left'; dx=-player.speed; }
    if (keys['ArrowRight']||keys['d']||keys['D']) { player.dir='right'; dx=player.speed; }
    if (dx&&dy) { dx*=0.707; dy*=0.707; }
    if (dx&&player.canMove(player.x+dx, player.y, all)) player.x+=dx;
    if (dy&&player.canMove(player.x, player.y+dy, all)) player.y+=dy;
    if (player.cooldown>0) player.cooldown--;
    if ((keys[' ']||keys['j']||keys['J'])&&player.cooldown<=0) {
      var b=player.fire();
      if (b) { bullets.push(b); sfx(200,0.1,'square',0.06); }
    }
  }

  // 敌人
  for (var i=0; i<enemies.length; i++) {
    var e=enemies[i];
    if (!e.alive) continue;
    e.aiTimer++;
    if (e.aiTimer>=e.aiDur) {
      e.aiTimer=0; e.aiDur=30+Math.random()*80;
      if (Math.random()<0.35&&player.alive) {
        var pdx=player.x-e.x, pdy=player.y-e.y;
        e.aiDir=Math.abs(pdx)>Math.abs(pdy)?(pdx>0?'right':'left'):(pdy>0?'down':'up');
      } else {
        var dd=['up','down','left','right']; e.aiDir=dd[Math.floor(Math.random()*4)];
      }
    }
    e.dir=e.aiDir;
    var edx=0, edy=0;
    if (e.aiDir==='up') edy=-e.speed;
    else if (e.aiDir==='down') edy=e.speed;
    else if (e.aiDir==='left') edx=-e.speed;
    else edx=e.speed;
    if (edx&&e.canMove(e.x+edx, e.y, all)) e.x+=edx;
    else if (edx&&!edy) e.aiTimer=e.aiDur;
    if (edy&&e.canMove(e.x, e.y+edy, all)) e.y+=edy;
    else if (edy&&!edx) e.aiTimer=e.aiDur;
    if (e.cooldown>0) e.cooldown--;
    if (e.cooldown<=0&&Math.random()<0.02&&player.alive) {
      var eb=e.fire(); if (eb) bullets.push(eb);
    }
  }

  // 子弹
  for (var i=0; i<bullets.length; i++) bullets[i].update();

  // 碰撞
  for (var i=0; i<bullets.length; i++) {
    var b=bullets[i];
    if (!b.alive) continue;
    if (b.fromPlayer) {
      for (var j=0; j<enemies.length; j++) {
        if (!enemies[j].alive) continue;
        var er=enemies[j].rect();
        if (b.x>er.l&&b.x<er.r&&b.y>er.t&&b.y<er.b) {
          b.alive=false; enemies[j].alive=false;
          explode(enemies[j].x+19.5, enemies[j].y+19.5);
          sfx(40,0.5,'sawtooth',0.12);
          score+=100; updateUI(); break;
        }
      }
    } else {
      if (!player.alive) continue;
      var pr=player.rect();
      if (b.x>pr.l&&b.x<pr.r&&b.y>pr.t&&b.y<pr.b) {
        b.alive=false; player.alive=false;
        explode(player.x+19.5, player.y+19.5);
        sfx(40,0.5,'sawtooth',0.12);
        lives--; respawnTimer=0; updateUI();
        if (lives<=0) {
          state=OVER;
          document.getElementById('startBtn').style.display='';
          document.getElementById('startBtn').textContent='重新开始';
          log('Game Over! Score:'+score);
        }
      }
    }
  }

  bullets=bullets.filter(function(b){return b.alive;});
  enemies=enemies.filter(function(e){return e.alive;});

  // 刷怪
  spawnTimer++;
  if (spawnTimer>180&&enemies.length<3+level) {
    spawnTimer=0;
    var ne=spawnEnemy(), overlap=false;
    for (var k=0; k<all.length; k++) {
      if (all[k].alive&&ne.hitTank(all[k])) { overlap=true; break; }
    }
    if (!overlap) enemies.push(ne);
  }

  for (var i=0; i<parts.length; i++) parts[i].update();
  parts=parts.filter(function(p){return p.life>0;});

  if (score>=(5+level*3)*100&&enemies.length===0) {
    state=WIN;
    log('Level complete! Score:'+score);
  }
}

// 渲染
function drawMap() {
  for (var y=0; y<ROWS; y++) {
    for (var x=0; x<COLS; x++) {
      if (map[y][x]===WALL) {
        var wx=x*TILE, wy=y*TILE;
        ctx.fillStyle='#8b6914';
        ctx.fillRect(wx+1, wy+1, TILE-2, TILE-2);
        ctx.fillStyle='#7a5810';
        ctx.fillRect(wx+1, wy+TILE/2-1, TILE-2, 2);
        ctx.fillRect(wx+TILE/2-1, wy+1, 2, TILE/2-1);
        ctx.strokeStyle='#5a3800'; ctx.lineWidth=1;
        ctx.strokeRect(wx+1, wy+1, TILE-2, TILE-2);
      }
    }
  }
}

function drawMenu() {
  ctx.fillStyle='rgba(0,0,0,0.82)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#0f0';
  ctx.font='bold 52px "Microsoft YaHei",sans-serif';
  ctx.shadowColor='#0f0'; ctx.shadowBlur=20;
  ctx.fillText('HAMA坦克大战',W/2,H/2-70);
  ctx.shadowBlur=0;
  ctx.fillStyle='#aaa';
  ctx.font='18px "Courier New",monospace';
  ctx.fillText('HAMA TANK BATTLE',W/2,H/2-25);
  var alpha=0.5+0.5*Math.sin(Date.now()/400);
  ctx.fillStyle='rgba(0,255,0,'+alpha+')';
  ctx.font='bold 20px "Microsoft YaHei",sans-serif';
  ctx.fillText('按 ENTER 或点击按钮开始',W/2,H/2+25);
  ctx.fillStyle='#888';
  ctx.font='15px "Microsoft YaHei",sans-serif';
  ctx.fillText('WASD / 方向键移动    空格键射击',W/2,H/2+60);
  ctx.fillText('消灭敌人得分 · 摧毁墙壁开路 · 全灭敌人过关',W/2,H/2+85);
  ctx.textAlign='start';
  // 迷你坦克
  drawMiniTank(W/2-90, H/2-8, 0, '#0a0');
  drawMiniTank(W/2+90, H/2-8, Math.PI, '#e00');
}

function drawMiniTank(x,y,angle,color) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(-12,-10,3,20); ctx.fillRect(9,-10,3,20);
  ctx.fillStyle=color; ctx.fillRect(-9,-8,18,18);
  ctx.fillStyle='#ccc'; ctx.fillRect(-2,-14,4,8);
  ctx.fillStyle='#fff'; ctx.font='bold 5px "Courier New",monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('HAMA',0,1);
  ctx.restore();
}

function drawOverlay(title, subtitle) {
  ctx.fillStyle='rgba(0,0,0,0.75)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#ff0';
  ctx.font='bold 42px "Microsoft YaHei",sans-serif';
  ctx.shadowColor='#ff0'; ctx.shadowBlur=15;
  ctx.fillText(title,W/2,H/2-40);
  ctx.shadowBlur=0;
  ctx.fillStyle='#ccc';
  ctx.font='20px "Microsoft YaHei",sans-serif';
  ctx.fillText(subtitle,W/2,H/2+15);
  ctx.textAlign='start';
}

function draw() {
  // 背景
  ctx.fillStyle='#1a1a1a';
  ctx.fillRect(0,0,W,H);

  if (state===PLAY) {
    // ---- 游戏中 ----
    // 网格
    ctx.strokeStyle='#252525';
    ctx.lineWidth=0.5;
    for (var x=0; x<=W; x+=TILE) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (var y=0; y<=H; y+=TILE) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

    drawMap();

    // 坦克
    if (player && player.alive) {
      player.draw();
      // 画一个大光圈标记玩家位置
      ctx.strokeStyle = 'rgba(0,255,0,0.6)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(player.x+19.5, player.y+19.5, 30, 0, Math.PI*2);
      ctx.stroke();
    }
    for (var i=0; i<enemies.length; i++) {
      if (enemies[i].alive) {
        enemies[i].draw();
        // 画光圈标记敌人
        ctx.strokeStyle = 'rgba(255,0,0,0.6)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(enemies[i].x+19.5, enemies[i].y+19.5, 30, 0, Math.PI*2);
        ctx.stroke();
      }
    }

    // 子弹和粒子
    for (var i=0; i<bullets.length; i++) bullets[i].draw();
    for (var i=0; i<parts.length; i++) parts[i].draw();

    // 左上角状态
    ctx.fillStyle = '#0f0';
    ctx.font = 'bold 14px "Courier New",monospace';
    ctx.fillText('HAMA:('+Math.floor(player.x)+','+Math.floor(player.y)+') ENEMIES:'+enemies.length+' SCORE:'+score, 10, 20);

    draw._wt = null;
  } else if (state===MENU) {
    drawMenu();
  } else if (state===OVER) {
    drawOverlay('GAME OVER', '最终得分: '+score);
    var a=0.5+0.5*Math.sin(Date.now()/400);
    ctx.textAlign='center';
    ctx.fillStyle='rgba(0,255,0,'+a+')';
    ctx.font='bold 18px "Microsoft YaHei",sans-serif';
    ctx.fillText('按 ENTER 或点击按钮重新开始',W/2,H/2+55);
    ctx.textAlign='start';
  } else if (state===WIN) {
    drawOverlay('恭喜过关!', '得分: '+score+'    第'+(level+1)+'关即将开始...');
    if (!draw._wt) draw._wt=Date.now();
    if (Date.now()-draw._wt>2000) {
      draw._wt=null; nextLevel(); state=PLAY; updateUI();
    }
  }
}

// 主循环
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
log('Loop started. State:MENU');
</script>
